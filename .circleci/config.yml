version: 2.1

jobs:
  source-check:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - sayit-npm-v1-{{ checksum "package-lock.json" }}
            - sayit-npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: sayit-npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run source tests
          command: npm test
      - run:
          name: Verify static PWA files
          command: |
            test -f pages/index.html
            test -f pages/app.html
            test -f pages/site.webmanifest
            test -f pages/sw.js

workflows:
  sayit_integrity:
    jobs:
      - source-check
